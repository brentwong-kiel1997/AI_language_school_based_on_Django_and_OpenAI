<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{% block title %}BALS AI 语言学校{% endblock %}</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"><style>
:root{--ink:#172033;--muted:#687386;--brand:#6457f5;--brand-dark:#4438c8;--soft:#f5f6fa;--panel:#fff;--line:#e8ebf1;--green:#178557}*{box-sizing:border-box}body{margin:0;background:var(--soft);color:var(--ink);font-family:"PingFang SC","Microsoft YaHei",Inter,system-ui,sans-serif}.navbar{background:#fff!important;border-bottom:1px solid var(--line);height:72px}.content-shell{max-width:1240px}.brand-mark{display:inline-grid;place-items:center;width:36px;height:36px;border-radius:12px;background:linear-gradient(135deg,var(--brand),#9a72ff);color:#fff;font-weight:900;margin-right:10px}.brand-name{letter-spacing:-.03em}.nav-link{color:var(--muted)!important}.card,.panel{border:1px solid var(--line);border-radius:22px;background:var(--panel);box-shadow:0 10px 30px #17203308}.btn-primary{background:var(--brand);border-color:var(--brand);box-shadow:0 8px 20px #6457f530}.form-control,.form-select{border:1px solid var(--line);border-radius:14px;padding:.78rem 1rem}.form-control:focus,.form-select:focus{border-color:#9c94ff;box-shadow:0 0 0 4px #6457f512}.btn-primary:hover{background:var(--brand-dark);border-color:var(--brand-dark)}.eyebrow{color:var(--brand);font-size:.73rem;font-weight:800;letter-spacing:.12em}.section-title{font-weight:850;letter-spacing:-.045em}.muted{color:var(--muted)}.video-frame{display:block;aspect-ratio:16/9;width:100%;border:0;border-radius:16px;background:#111}.caption{display:flex;gap:16px;padding:14px 20px;border-bottom:1px solid var(--line);line-height:1.65}.caption time{flex:0 0 76px;color:var(--brand);font-weight:750;font-variant-numeric:tabular-nums}.transcript-box{max-height:650px;overflow:auto}.material-section{height:100%;padding:26px}.material-section h3{font-size:1.05rem;font-weight:800}.list-clean{padding-left:1.2rem}.list-clean li{margin-bottom:10px}.footer{color:var(--muted);font-size:.82rem}.wait-card{max-width:680px;margin:80px auto}.spinner{width:54px;height:54px;border:5px solid #e7e5ff;border-top-color:var(--brand);border-radius:50%;animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.sticky-tool{position:sticky;top:94px}.page-kicker{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:.9rem}.page-kicker:before{content:"";width:8px;height:8px;background:var(--brand);border-radius:50%}.lesson-grid{display:grid;grid-template-columns:minmax(0,1fr) 380px;gap:24px}.lesson-side{display:flex;flex-direction:column;gap:16px}.action-card{padding:26px}.action-card .form-select{border-radius:12px;padding:12px}.toolbar{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--line)}.toolbar strong{margin-right:auto}@media(max-width:991px){.lesson-grid{grid-template-columns:1fr}.sticky-tool{position:static}}@media(max-width:600px){.navbar{height:64px}.brand-name{font-size:.95rem}.content-shell{padding-left:16px!important;padding-right:16px!important}.caption{padding:12px 14px;gap:10px}.caption time{flex-basis:62px;font-size:.82rem}.material-section{padding:20px}}
.status-pill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:5px 10px;background:#f0efff;color:var(--brand);font-size:.78rem;font-weight:700}.course-card{transition:transform .2s,box-shadow .2s}.course-card:hover{transform:translateY(-3px);box-shadow:0 18px 40px #17203312}.empty-state{padding:64px 24px;text-align:center}.step-dot{width:36px;height:36px;border-radius:50%;display:grid;place-items:center;background:#eef0f5;color:#9aa1ad;font-weight:800}.step.is-active .step-dot{background:var(--brand);color:#fff;box-shadow:0 0 0 7px #6457f512}.step.is-done .step-dot{background:#dcf7eb;color:var(--green)}.step-line{height:2px;flex:1;background:var(--line)}
</style></head><body><nav class="navbar sticky-top"><div class="container content-shell"><a class="navbar-brand fw-bold d-flex align-items-center" href="{% url 'home' %}"><span class="brand-mark">B</span><span class="brand-name">BALS <span class="text-muted fw-normal">AI 语言学校</span></span></a><div class="ms-auto d-flex align-items-center gap-3"><a class="nav-link d-none d-sm-block" href="{% url 'home' %}"><i class="bi bi-grid me-1"></i>课程库</a><a class="btn btn-primary rounded-pill px-3" href="{% url 'url_input' %}"><i class="bi bi-plus-lg me-1"></i>创建课程</a></div></div></nav><main class="container content-shell py-4 py-lg-5">{% if messages %}{% for message in messages %}<div class="alert alert-danger border-0 rounded-4 shadow-sm">{{ message }}</div>{% endfor %}{% endif %}{% block content %}{% endblock %}</main><footer class="footer container content-shell py-4">BALS · 用真实视频学习外语 <span class="float-lg-end">由 MiniMax-M3 辅助生成</span></footer><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>{% block scripts %}{% endblock %}</body></html>
